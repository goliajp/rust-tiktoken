name: release

on:
  push:
    tags:
      - 'v*'                    # → publish tiktoken crate
      - 'tiktoken-wasm-v*'      # → publish tiktoken-wasm crate + npm

jobs:
  publish-tiktoken:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish -p tiktoken --token ${{ secrets.CRATES_IO_TOKEN }}

  publish-tiktoken-wasm:
    if: startsWith(github.ref, 'refs/tags/tiktoken-wasm-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install wasm-pack
      - name: build wasm
        working-directory: tiktoken-wasm
        run: wasm-pack build --target web --release --scope goliapkg
      - name: publish to crates.io
        working-directory: tiktoken-wasm
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: publish to npm
        working-directory: tiktoken-wasm/pkg
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: [publish-tiktoken, publish-tiktoken-wasm]
    if: always() && (needs.publish-tiktoken.result == 'success' || needs.publish-tiktoken-wasm.result == 'success')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
